name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: typecheck + contract smokes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          path: f2b-sandbox

      - name: Checkout f2b-spec (file dependency)
        uses: actions/checkout@v4
        with:
          repository: f2b-dev/f2b-spec
          path: f2b-spec

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install f2b-spec
        working-directory: f2b-spec
        run: pnpm install --frozen-lockfile

      - name: Install f2b-sandbox
        working-directory: f2b-sandbox
        run: pnpm install --frozen-lockfile

      - name: Contract smokes
        working-directory: f2b-sandbox
        env:
          # 隔离端口，避免与 runner 上其它服务冲突
          F2B_CI_PORT: "18787"
          F2B_CI_AUTH_PORT: "18788"
          F2B_CI_CAP_PORT: "19789"
          F2B_CI_TIMEOUT_PORT: "19790"
          F2B_CI_CUBE_PORT: "18991"
          F2B_CI_ENVD_PORT: "18992"
        run: pnpm ci:contract

  image:
    name: docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          path: f2b-sandbox

      - name: Checkout f2b-spec
        uses: actions/checkout@v4
        with:
          repository: f2b-dev/f2b-spec
          path: f2b-spec

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/f2b-dev/sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build (and push on main)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: f2b-sandbox/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 1.0 前：生成 SBOM 工件；semver tag / cosign 仍待 1.0 日
      - name: SBOM (Syft)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/f2b-dev/sandbox:latest
          format: spdx-json
          output-file: sandbox-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false
